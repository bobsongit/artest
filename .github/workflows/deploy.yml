name: Install dependencies and deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download exact library versions used in official AR.js examples
        run: |
          mkdir -p vendor

          # Exact A-Frame commit used in all official AR.js NFT examples
          curl -L "https://cdn.jsdelivr.net/gh/aframevr/aframe@1c2407b26c61958baa93967b5412487cd94b290b/dist/aframe-master.min.js" -o vendor/aframe-arjs.min.js
          echo "aframe size: $(wc -c < vendor/aframe-arjs.min.js)"

          # AR.js NFT build from master
          curl -L "https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js" -o vendor/arjs-nft-official.js
          echo "arjs size: $(wc -c < vendor/arjs-nft-official.js)"

          ls -lh vendor/

      - name: Commit and push vendor/ files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vendor/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto: add official AR.js example scripts"
            git push origin main
          fi
