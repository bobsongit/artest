name: Install dependencies and deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download library files
        run: |
          mkdir -p vendor

          # aframe 1.6.0
          npm pack aframe@1.6.0
          tar -xzf aframe-1.6.0.tgz
          cp package/dist/aframe-v1.6.0.min.js vendor/aframe-160.min.js
          rm -rf package aframe-1.6.0.tgz

          # AR.js - copy both builds
          npm pack @ar-js-org/ar.js@3.4.5
          tar -xzf ar-js-org-ar.js-3.4.5.tgz
          cp package/aframe/build/aframe-ar-nft.js vendor/arjs-nft.min.js
          cp package/aframe/build/aframe-ar.js vendor/arjs-standard.min.js
          rm -rf package ar-js-org-ar.js-3.4.5.tgz

          echo "vendor/ contents:"
          ls -lh vendor/

      - name: Commit and push vendor/ files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vendor/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto: update vendor files"
            git push origin main
          fi
